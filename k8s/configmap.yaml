apiVersion: v1
kind: Namespace
metadata:
  name: agentshield
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentshield-config
  namespace: agentshield
data:
  LOG_LEVEL: "INFO"
  DATABASE_URL: "postgresql://postgres:password@postgres:5432/agentshield"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentshield-secret
  namespace: agentshield
type: Opaque
stringData:
  SECRET_KEY: "your-secret-key-here"
  DATABASE_PASSWORD: "password"
