apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentshield.fullname" . }}
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentshield.fullname" . }}-config
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "firewall": {
        "enabled": {{ .Values.config.firewall.enabled }},
        "blocker": {
          "block_critical": {{ .Values.config.firewall.blockCritical }},
          "block_high": {{ .Values.config.firewall.blockHigh }}
        }
      },
      "tool_manager": {
        "enabled": {{ .Values.config.toolManager.enabled }}
      },
      "data_gateway": {
        "enabled": {{ .Values.config.dataGateway.enabled }}
      },
      "audit_logger": {
        "enabled": {{ .Values.config.auditLogger.enabled }},
        "persist_to_file": {{ .Values.config.auditLogger.persistToFile }},
        "log_file_path": "{{ .Values.config.auditLogger.logFilePath }}"
      },
      "monitoring": {
        "prometheus_enabled": {{ .Values.config.monitoring.prometheusEnabled }},
        "health_check_enabled": {{ .Values.config.monitoring.healthCheckEnabled }}
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentshield.fullname" . }}
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.livenessPort }}
      targetPort: liveness
      protocol: TCP
      name: liveness
    - port: {{ .Values.service.readinessPort }}
      targetPort: readiness
      protocol: TCP
      name: readiness
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "agentshield.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentshield.fullname" . }}
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentshield.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agentshield.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: liveness
              containerPort: {{ .Values.service.livenessPort }}
              protocol: TCP
            - name: readiness
              containerPort: {{ .Values.service.readinessPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: liveness
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: readiness
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: logs
              mountPath: /var/log/agentshield
          env:
            - name: AGENTSHIELD_CONFIG_PATH
              value: /app/config/config.json
      volumes:
        - name: config
          configMap:
            name: {{ include "agentshield.fullname" . }}-config
        - name: logs
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agentshield.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agentshield.fullname" . }}
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Values.fullnameOverride | default $.Release.Name }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
---
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agentshield.fullname" . }}-data
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode | quote }}
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
{{- end }}
